er;gap:10px}.mobile-brand h1{font-size:19px;margin:0;letter-spacing:-.05em}.mobile-nav{display:flex;gap:7px;overflow:auto;margin-top:10px;scrollbar-width:none}.mobile-nav::-webkit-scrollbar{display:none}.mobile-nav button{border:1px solid var(--line);border-radius:999px;background:rgba(15,23,42,.74);color:#cbd5e1;padding:8px 10px;white-space:nowrap;font-weight:800}.mobile-nav button.active{border-color:rgba(56,189,248,.55);background:rgba(56,189,248,.14);color:white}.main{padding:12px}.grid,.grid.three,.grid.two,.form.two,.form.three{grid-template-columns:1fr}.grid.compact-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.topline{display:block}.toolbar{margin-top:10px}.metric{min-height:auto}.member-line{grid-template-columns:1fr 1fr;gap:7px}.member-line .member-name{grid-column:1/-1}.member-line .shortage{grid-column:1/-1}table{min-width:780px}}

<body>
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="brand-logo" style="margin-bottom:14px">AXE</div>
      <h1>AXE 업무센터</h1>
      <p class="muted" style="margin:0 0 18px">공금관리 · 자산관리 · 월별현황</p>
      <div id="apiWarning" class="notice hide"><b>API URL 설정 필요</b><br><span class="small muted">HTML 상단의 AXE_WORKCENTER_API_URL에 Apps Script 배포 URL을 입력하세요.</span></div>
      <div class="form">
        <label>닉네임<input id="loginNickname" autocomplete="username" placeholder="회원목록의 닉네임"></label>
        <label>접속코드<input id="loginCode" type="password" inputmode="numeric" autocomplete="current-password" placeholder="개인 접속코드"></label>
        <button class="btn" id="loginBtn" onclick="login()">로그인</button>
      </div>
      <p class="small muted" style="margin:14px 0 0">홈 화면에 추가하면 앱처럼 사용할 수 있습니다.</p>
    </div>
  </div>
  <div id="appPage" class="hide">
    <div class="mobile-top"><div class="mobile-brand"><h1>AXE 업무센터</h1><button class="btn secondary" onclick="logout()">로그아웃</button></div><div id="mobileNav" class="mobile-nav"></div></div>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><div class="brand-logo">AXE</div><div><h1>AXE 업무센터</h1><p>공금 · 자산 · 운영기록</p></div></div>
        <div id="sideNav" class="nav"></div>
        <div class="side-foot"><div id="userBox" class="user-chip">-</div><button class="btn secondary" onclick="logout()">로그아웃</button></div>
      </aside>
      <main class="main">
        <section id="screenHome" class="screen active"></section>
        <section id="screenFund" class="screen"></section>
        <section id="screenRequest" class="screen"></section>
        <section id="screenMonthly" class="screen"></section>
        <section id="screenAsset" class="screen"></section>
        <section id="screenBalance" class="screen"></section>
      </main>
    </div>
  </div>
  <div id="toast" class="toast"></div>
<script>
const API_URL=(window.AXE_WORKCENTER_API_URL||"").trim();
const VERSION="2026-07-06-v1.2-axe-net-layout";
const STORAGE_KEY="axe_workcenter_session_v12";
const state={session:null,data:null,month:"",tab:"home",fundSection:"summary"};
const TABS=[
  {id:"home",label:"대시보드",screen:"screenHome",desc:"요약"},
  {id:"request",label:"공금신청",screen:"screenRequest",desc:"팀원"},
  {id:"fund",label:"공금관리",screen:"screenFund",desc:"장부"},
  {id:"monthly",label:"월별현황",screen:"screenMonthly",desc:"납부"},
  {id:"asset",label:"자산관리",screen:"screenAsset",desc:"자산"},
  {id:"balance",label:"잔고검증",screen:"screenBalance",desc:"검증",admin:true}
];
window.addEventListener("load",async()=>{if(!API_URL)document.getElementById("apiWarning").classList.remove("hide");if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});const saved=localStorage.getItem(STORAGE_KEY);if(saved){try{state.session=JSON.parse(saved);showApp();await loadData();}catch(e){localStorage.removeItem(STORAGE_KEY);}}});
function authPayload(){return{member_id:state.session?.member_id,access_code:state.session?.access_code}}
async function api(action,data={}){if(!API_URL)throw new Error("API URL이 비어 있습니다.");const payload={action,...data};if(action!=="login")payload.auth=authPayload();const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});const text=await res.text();let json;try{json=JSON.parse(text)}catch(e){throw new Error("API 응답을 읽지 못했습니다. 배포 URL 또는 권한을 확인해 주세요.")}if(!json.ok)throw new Error(json.error||"요청 처리 중 오류가 발생했습니다.");return json;}
async function login(){const btn=document.getElementById("loginBtn");try{setBusy(btn,true,"로그인 중");const nickname=val("loginNickname");const code=val("loginCode");const res=await api("login",{nickname,access_code:code});state.session={...res.member,access_code:code};localStorage.setItem(STORAGE_KEY,JSON.stringify(state.session));showApp();await loadData();toast("로그인되었습니다.");}catch(e){toast(e.message)}finally{setBusy(btn,false)}}
function logout(){localStorage.removeItem(STORAGE_KEY);location.reload()}
function showApp(){document.getElementById("loginPage").classList.add("hide");document.getElementById("appPage").classList.remove("hide");renderNav();renderUser();}
function renderUser(){const u=state.session;if(!u)return;const html=`<b>${esc(u.nickname)}</b><br><span class="small muted">${esc(u.position||u.role)} · ${u.is_admin?'관리자':'팀원'}</span>`;const box=document.getElementById("userBox");if(box)box.innerHTML=html;}
function visibleTabs(){return TABS.filter(t=>!t.admin||isAdmin())}
function renderNav(){const items=visibleTabs();const make=t=>`<button class="${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}<span>${t.desc}</span></button>`;document.getElementById("sideNav").innerHTML=items.map(make).join("");document.getElementById("mobileNav").innerHTML=items.map(t=>`<button class="${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join("");}
function switchTab(id){state.tab=id;document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));const tab=TABS.find(t=>t.id===id);document.getElementById(tab.screen).classList.add('active');renderNav();renderAll();window.scrollTo({top:0,behavior:'smooth'});}
async function loadData(month){try{state.month=month||state.month||new Date().toISOString().slice(0,7);const res=await api("get_data",{month:state.month});state.data=res;state.month=res.current_month||state.month;renderAll();}catch(e){toast(e.message)}}
function renderAll(){if(!state.data)return;renderHome();renderRequest();renderFund();renderMonthly();renderAsset();if(isAdmin())renderBalance();}
function pageHead(title,sub,actions=''){return `<div class="topline axe-page-head"><div><div class="eyebrow">AXE WORKCENTER</div><h2>${title}</h2><p>${sub}</p></div><div class="toolbar">${actions}</div></div>`}
function monthSelectHtml(id){return `<label style="min-width:150px">기준월<input id="${id}" type="month" value="${esc(currentMonth())}" onchange="loadData(this.value)"></label>`}

')">공금관리로 이동</button></div>${requestTable((d.requests||[]).filter(r=>r['상태']==='대기').slice(0,8),isAdmin(),true)}</div><div class="card"><div class="panel-title"><h3>내 월별현황</h3><button class="btn secondary" onclick="switchTab('monthly')">전체보기</button></div>${monthlyMatrix((d.monthly_status||[]).filter(r=>!isAdmin()||r['닉네임']===state.session.nickname).slice(0,24))}</div></div>`}

function renderFund(){const d=state.data||{},b=d.balance||{},ledgers=d.ledgers||[],pending=(d.requests||[]).filter(r=>r['상태']==='대기');document.getElementById("screenFund").innerHTML=pageHead('공금관리','공금 요약, 신청 검수, 내역 등록을 한 화면에서 관리합니다.',`${monthSelectHtml('fundMonth')} ${isAdmin()?'<button class="btn secondary" onclick="loadData(currentMonth())">새로고침</button>':''}`)+`<div class="seg" style="margin-bottom:12px">${['summary:요약','requests:공금신청 관리','ledger:공금내역','manual:직접기입'].map(x=>{const [id,label]=x.split(':');return `<button class="${state.fundSection===id?'active':''}" onclick="state.fundSection='${id}';renderFund()">${label}</button>`}).join('')}</div><div class="grid"><div class="card metric"><div class="label">공용계좌 잔고</div><div class="value mono">${fmtMoney(b.public_balance)}</div><div class="sub">반영내역 ${b.counted_count||0}건</div></div><div class="card metric"><div class="label">수입 합계</div><div class="value mono good">${fmtMoney(b.public_income)}</div><div class="sub">공용계좌 수입</div></div><div class="card metric"><div class="label">지출 합계</div><div class="value mono bad">${fmtMoney(b.public_expense)}</div><div class="sub">공용계좌 지출</div></div><div class="card metric"><div class="label">조정 합계</div><div class="value mono warnc">${fmtMoney(b.public_adjustment)}</div><div class="sub">부호 그대로 반영</div></div></div><div style="margin-top:12px">${fundSectionHtml(state.fundSection,pending,ledgers)}</div>`}
function fundSectionHtml(section,pending,ledgers){if(section==='requests')return `<div class="card"><div class="panel-title"><h3>검수대기 공금신청</h3><span class="pill">${pending.length}건</span></div>${requestTable(pending,true,true)}</div>`;if(section==='ledger')return `<div class="card"><div class="panel-title"><h3>공금내역</h3><span class="pill">${ledgers.length}건</span></div>${ledgerTable(ledgers)}</div>`;if(section==='manual')return manualLedgerCard();return `<div class="grid two"><div class="card"><div class="panel-title"><h3>승인대기 공금신청</h3><span class="pill">${pending.length}건</span></div>${requestTable(pending,true,true)}</div><div class="card"><div class="panel-title"><h3>잔고 계산 기준</h3><span class="pill">공용계좌</span></div>${balanceBasis()}</div></div><div class="card" style="margin-top:12px"><div class="panel-title"><h3>최근 공금내역</h3><button class="btn secondary" onclick="state.fundSection='ledger';renderFund()">전체보기</button></div>${ledgerTable(ledgers.slice(0,12))}</div>`}
function manualLedgerCard(){if(!isAdmin())return `<div class="card"><p class="muted small">관리자만 직접기입을 사용할 수 있습니다.</p></div>`;return `<div class="card"><div class="panel-title"><h3>직접기입</h3><span class="pill">수입/지출/조정</span></div><div class="form three"><label>날짜<input id="mlDate" type="date" value="${today()}"></label><label>월<input id="mlMonth" type="month" value="${esc(currentMonth())}"></label><label>주차<select id="mlWeek"><option value="">-</option>${weekOptions()}</select></label><label>수입지출<select id="mlDirection"><option>수입</option><option>지출</option><option>조정</option></select></label><label>계좌<select id="mlAccount"><option>공용계좌</option><option>회사잔고</option></select></label><label>금액<input id="mlAmount" inputmode="numeric"></label><label>유형<input id="mlType" value="직접기입"></label><label>항목<input id="mlItem" placeholder="전쟁 / 의뢰비 / 자산 등"></label><label>관련자<input id="mlRelated" placeholder="대상자/내용"></label><label>잔고반영여부<select id="mlApply"><option value="TRUE">TRUE</option><option value="FALSE">FALSE</option></select></label><label style="grid-column:1/-1">증빙URL<input id="mlEvidence"></label><label style="grid-column:1/-1">메모<textarea id="mlMemo"></textarea></label><button class="btn" onclick="createManualLedger(this)">직접기입 등록</button></div></div>`}
function renderMonthly(){const rows=state.data?.monthly_status||[],stats=monthlyStats(rows);document.getElementById("screenMonthly").innerHTML=pageHead('월별현황','월별 납부완료, 부족, 미납 상태를 확인합니다.',`${monthSelectHtml('monthlyMonth')} ${isAdmin()?'<button class="btn secondary" onclick="recalculateMonthly(this)">재계산</button>':''}`)+`<div class="grid compact-metrics four"><div class="card metric"><div class="label">납부완료</div><div class="value good">${stats.paid}</div></div><div class="card metric"><div class="label">부족</div><div class="value warnc">${stats.short}</div></div><div class="card metric"><div class="label">미납</div><div class="value bad">${stats.unpaid}</div></div><div class="card metric"><div class="label">면제</div><div class="value blue">${stats.exempt}</div></div></div><div class="card" style="margin-top:12px"><div class="panel-title"><h3>월별현황 매트릭스</h3><span class="pill">AXE NET 납부현황형</span></div>${monthlyMatrix(rows)}</div><div class="card" style="margin-top:12px"><div class="panel-title"><h3>상세 목록</h3><span class="pill">시트 기준</span></div>${monthlyTable(rows)}</div>`}
function renderAsset(){const d=state.data||{},assets=d.assets||[],logs=d.asset_logs||[],s=d.asset_summary||{};document.getElementById("screenAsset").innerHTML=pageHead('자산관리','회사 자산의 보유자와 처리 이력을 확인합니다.',`<span class="pill">보유자 기준 조회</span>`)+`<div class="grid compact-metrics"><div class="card metric"><div class="label">전체 자산</div><div class="value">${s.total||0}개</div></div><div class="card metric"><div class="label">지급중</div><div class="value good">${s.assigned||0}개</div></div><div class="card metric"><div class="label">보관중</div><div class="value blue">${s.available||0}개</div></div><div class="card metric"><div class="label">취득금액</div><div class="value">${fmtMoney(s.value||0)}</div></div></div><div class="grid two" style="margin-top:12px"><div class="card"><div class="panel-title"><h3>보유자별 자산</h3><span class="pill">현재보유자</span></div>${ownerAssets(assets)}</div><div class="card"><div class="panel-title"><h3>최근 자산이력</h3><span class="pill">처리기록</span></div>${assetLogTable(logs.slice(0,8),true)}</div></div><div class="card" style="margin-top:12px"><div class="panel-title"><h3>자산목록</h3><span class="pill">${assets.length}건</span></div>${assetTable(assets)}</div><div class="card" style="margin-top:12px"><div class="panel-title"><h3>자산이력</h3><span class="pill">${logs.length}건</span></div>${assetLogTable(logs)}</div>`}
function renderBalance(){if(!isAdmin())return;const d=state.data||{},b=d.balance||{},latest=d.latest_balance_check;document.getElementById("screenBalance").innerHTML=pageHead('잔고검증','홈페이지 계산잔고와 인게임 공용계좌 잔고 대조',monthSelectHtml('balanceMonth'))+`<div class="grid compact-metrics three"><div class="card metric"><div class="label">홈페이지 계산잔고</div><div class="value mono">${fmtMoney(b.public_balance)}</div></div><div class="card metric"><div class="label">최근 인게임 잔고</div><div class="value mono">${latest?fmtMoney(latest['인게임잔고']):'-'}</div></div><div class="card metric"><div class="label">최근 차이금액</div><div class="value mono ${latest&&num(latest['차이금액'])!==0?'bad':'good'}">${latest?fmtMoney(latest['차이금액']):'-'}</div></div></div><div class="grid two" style="margin-top:12px"><div class="card"><div class="panel-title"><h3>잔고검증 등록</h3><span class="pill">공용계좌</span></div><div class="form"><label>기준월<input id="bcMonth" type="month" value="${esc(currentMonth())}"></label><label>인게임 공용계좌 잔고<input id="bcGame" inputmode="numeric" placeholder="숫자만 입력"></label><label>조치내용<textarea id="bcMemo"></textarea></label><button class="btn" onclick="createBalanceCheck(this)">잔고검증 등록</button></div></div><div class="card"><div class="panel-title"><h3>잔고 계산 상세</h3><span class="pill">검산용</span></div>${balanceBasis()}</div></div>`}
function balanceBasis(){const b=state.data?.balance||{};return `<div class="mini-list"><div class="mini-item"><span>수입 합계</span><b class="good">${fmtMoney(b.public_income)}</b></div><div class="mini-item"><span>지출 합계</span><b class="bad">-${fmtMoney(b.public_expense).replace('-','')}</b></div><div class="mini-item"><span>조정 합계</span><b class="warnc">${fmtMoney(b.public_adjustment)}</b></div><div class="mini-item"><span>계산 잔고</span><b>${fmtMoney(b.public_balance)}</b></div><div class="mini-item"><span>반영 내역</span><b>${b.counted_count||0}건</b></div><div class="mini-item"><span>제외 내역</span><b>${b.excluded_count||0}건</b></div></div>`}
async function submitFundRequest(btn){try{setBusy(btn,true,"등록 중");await api("submit_fund_request",{month:val("frMonth"),week:val("frWeek"),amount:val("frAmount"),deposit_account:val("frAccount"),evidence_url:val("frEvidence"),memo:val("frMemo")});toast("공금신청이 등록되었습니다.");await loadData(val("frMonth"));}catch(e){toast(e.message)}finally{setBusy(btn,false)}}
async function reviewRequest(id,decision,btn){const reason=decision==='reject'?prompt('반려사유를 입력하세요.','')||'':'';if(decision==='reject'&&!confirm('반려 처리할까요?'))return;if(decision==='approve'&&!confirm('승인 후 공금내역을 생성할까요?'))return;try{setBusy(btn,true,"처리 중");await api("review_fund_request",{request_id:id,decision,reason});toast(decision==='approve'?'승인 처리되었습니다.':'반려 처리되었습니다.');await loadData(currentMonth())}catch(e){toast(e.message)}finally{setBusy(btn,false)}}
async function createManualLedger(btn){try{setBusy(btn,true,"등록 중");await api("create_manual_ledger",{date:val("mlDate"),month:val("mlMonth"),week:val("mlWeek"),direction:val("mlDirection"),account:val("mlAccount"),amount:val("mlAmount"),type:val("mlType"),item:val("mlItem"),related_name:val("mlRelated"),evidence_url:val("mlEvidence"),apply_balance:val("mlApply"),memo:val("mlMemo")});toast("공금내역이 등록되었습니다.");await loadData(val("mlMonth"))}catch(e){toast(e.message)}finally{setBusy(btn,false)}}
async function recalculateMonthly(btn){if(!confirm(`${currentMonth()} 월별현황을 재계산할까요?`))return;try{setBusy(btn,true,"계산 중");await api("recalculate_monthly",{month:currentMonth()});toast("월별현황을 재계산했습니다.");await loadData(currentMonth())}catch(e){toast(e.message)}finally{setBusy(btn,false)}}
async function createBalanceCheck(btn){try{setBusy(btn,true,"등록 중");const res=await api("balance_check",{month:val("bcMonth"),game_balance:val("bcGame"),action_memo:val("bcMemo")});toast(`잔고검증 등록 완료 · 차이 ${fmtMoney(res.diff)}`);await loadData(val("bcMonth"))}catch(e){toast(e.message)}finally{setBusy(btn,false)}}
async function deleteLedger(id,btn){const reason=prompt('삭제사유를 입력하세요.','관리자 삭제');if(reason===null)return;if(!confirm('해당 공금내역을 삭제하고 삭제로그에 기록할까요?'))return;try{setBusy(btn,true,"삭제 중");await api("delete_ledger",{ledger_id:id,reason});toast("공금내역을 삭제했습니다.");await loadData(currentMonth())}catch(e){toast(e.message)}finally{setBusy(btn,false)}}
function requestTable(rows,adminMode,compact=false){if(!rows.length)return `<p class="muted small">표시할 신청내역이 없습니다.</p>`;const sorted=[...rows].sort((a,b)=>String(b['신청일시']).localeCompare(String(a['신청일시'])));return `<div class="tablewrap"><table><thead><tr><th>신청일시</th><th>월</th><th>주차</th><th>닉네임</th><th>금액</th><th>상태</th><th>처리자</th>${adminMode?'<th>관리</th>':''}</tr></thead><tbody>${sorted.map(r=>`<tr><td>${esc(r['신청일시'])}</td><td>${esc(r['신청월'])}</td><td>${esc(r['신청주차'])}</td><td>${esc(r['닉네임'])}</td><td class="amount">${fmtMoney(r['신청금액'])}</td><td>${statusBadge(r['상태'])}</td><td>${esc(r['처리자']||'-')}</td>${adminMode?`<td>${r['상태']==='대기'?`<button class="btn green" onclick="reviewRequest('${esc(r.request_id)}','approve',this)">승인</button> <button class="btn red" onclick="reviewRequest('${esc(r.request_id)}','reject',this)">반려</button>`:'-'}</td>`:''}</tr>`).join('')}</tbody></table></div>`}
function ledgerTable(rows){if(!rows.length)return `<p class="muted small">표시할 공금내역이 없습니다.</p>`;const sorted=[...rows].sort((a,b)=>String(b['날짜']||b['등록일시']).localeCompare(String(a['날짜']||a['등록일시'])));return `<div class="tablewrap"><table><thead><tr><th>날짜</th><th>유형</th><th>항목</th><th>관련자</th><th>월/주차</th><th>금액</th><th>수입지출</th><th>계좌</th><th>메모</th>${isAdmin()?'<th>관리</th>':''}</tr></thead><tbody>${sorted.map(r=>{const dir=r['수입지출'],cls=dir==='지출'?'bad':(dir==='조정'?'warnc':'good');return `<tr><td>${esc(r['날짜'])}</td><td>${esc(r['유형'])}</td><td>${esc(r['항목'])}</td><td>${esc(r['관련자']||'-')}</td><td>${esc(r['월']||'-')} / ${esc(r['주차']||'-')}</td><td class="amount ${cls}">${fmtMoney(r['금액'])}</td><td>${statusBadge(dir)}</td><td>${esc(r['계좌'])}</td><td class="memo">${esc(r['메모']||'-')}</td>${isAdmin()?`<td><button class="btn secondary" onclick="showLedgerMemo('${esc(r.ledger_id)}')">메모보기</button> <button class="btn red" onclick="deleteLedger('${esc(r.ledger_id)}',this)">삭제</button></td>`:''}</tr>`}).join('')}</tbody></table></div>`}
function showLedgerMemo(id){const r=(state.data?.ledgers||[]).find(x=>x.ledger_id===id);if(!r)return;alert(`메모: ${r['메모']||'-'}\n\n등록정보\n등록자: ${r['등록자']||'-'}\n등록일시: ${r['등록일시']||'-'}\n수정자: ${r['수정자']||'-'}\n수정일시: ${r['수정일시']||'-'}\n증빙: ${r['증빙URL']||'-'}`)}
function monthlyTable(rows){if(!rows.length)return `<p class="muted small">표시할 월별현황이 없습니다.</p>`;const sorted=[...rows].sort((a,b)=>String(a['닉네임']).localeCompare(String(b['닉네임']))||Number(a['주차'])-Number(b['주차']));return `<div class="tablewrap"><table><thead><tr><th>닉네임</th><th>주차</th><th>기준공금</th><th>납부합계</th><th>부족금액</th><th>상태</th><th>면제</th><th>납부내역</th></tr></thead><tbody>${sorted.map(r=>`<tr><td>${esc(r['닉네임'])}</td><td>${esc(r['주차'])}주차</td><td>${fmtMoney(r['기준공금'])}</td><td class="amount">${fmtMoney(r['납부합계'])}</td><td>${fmtMoney(r['부족금액'])}</td><td>${statusBadge(r['상태'])}</td><td>${esc(r['면제여부']||'N')}</td><td class="memo">${esc(r['납부내역ID목록']||'-')}</td></tr>`).join('')}</tbody></table></div>`}
function monthlyMatrix(rows){if(!rows.length)return `<p class="muted small">표시할 월별현황이 없습니다.</p>`;const group={};rows.forEach(r=>{const name=r['닉네임']||'-';if(!group[name])group[name]={name,rows:{},shortage:0};group[name].rows[Number(r['주차'])]=r;group[name].shortage+=num(r['부족금액']);});return `<div class="weekly-matrix">${Object.values(group).sort((a,b)=>a.name.localeCompare(b.name)).map(g=>`<div class="member-line"><b class="member-name">${esc(g.name)}</b>${[1,2,3,4].map(w=>{const r=g.rows[w];return `<div class="week-cell">${r?statusBadge(r['상태']):'<span class="badge">-</span>'}<b>${w}주차</b><span class="muted">${r?fmtMoney(r['납부합계']):'-'}</span></div>`}).join('')}<div class="shortage"><span class="small muted">부족합계</span><br><b class="${g.shortage>0?'bad':'good'}">${fmtMoney(g.shortage)}</b></div></div>`).join('')}</div>`}
function monthlyStats(rows){const out={paid:0,short:0,unpaid:0,exempt:0,need:0};rows.forEach(r=>{const s=r['상태'];if(s==='납부완료')out.paid++;else if(s==='부족'){out.short++;out.need++;}else if(s==='미납'){out.unpaid++;out.need++;}else if(s==='면제')out.exempt++;});return out}
function assetTable(rows){if(!rows.length)return `<p class="muted small">표시할 자산목록이 없습니다.</p>`;const sorted=[...rows].sort((a,b)=>String(a['자산분류']).localeCompare(String(b['자산분류']))||String(a['자산명']).localeCompare(String(b['자산명'])));return `<div class="tablewrap"><table><thead><tr><th>자산분류</th><th>자산명</th><th>고유번호</th><th>수량</th><th>상태</th><th>현재보유자</th><th>지급일</th><th>취득금액</th><th>메모</th></tr></thead><tbody>${sorted.map(a=>`<tr><td>${esc(a['자산분류'])}</td><td>${esc(a['자산명'])}</td><td>${esc(a['고유번호'])}</td><td>${esc(a['수량']||'1')} ${esc(a['단위']||'')}</td><td>${statusBadge(a['상태'])}</td><td>${esc(a['현재보유자']||'-')}</td><td>${esc(a['지급일']||'-')}</td><td>${fmtMoney(a['취득금액'])}</td><td class="memo">${esc(a['메모']||'-')}</td></tr>`).join('')}</tbody></table></div>`}
function assetLogTable(rows,compact=false){if(!rows.length)return `<p class="muted small">표시할 자산이력이 없습니다.</p>`;const sorted=[...rows].sort((a,b)=>String(b['처리일시']).localeCompare(String(a['처리일시'])));return `<div class="tablewrap"><table><thead><tr><th>처리일시</th><th>처리유형</th><th>자산명</th><th>대상자</th><th>수량</th><th>상태변경</th><th>처리자</th><th>메모</th></tr></thead><tbody>${sorted.map(a=>`<tr><td>${esc(a['처리일시'])}</td><td>${statusBadge(a['처리유형'])}</td><td>${esc(a['자산명'])}</td><td>${esc(a['대상자']||'-')}</td><td>${esc(a['수량']||'-')}</td><td>${esc(a['상태변경전']||'-')} → ${esc(a['상태변경후']||'-')}</td><td>${esc(a['처리자']||'-')}</td><td class="memo">${esc(a['메모']||'-')}</td></tr>`).join('')}</tbody></table></div>`}
function ownerAssets(rows){const active=rows.filter(a=>a['현재보유자']);if(!active.length)return `<p class="muted small">보유자 정보가 있는 자산이 없습니다.</p>`;const g={};active.forEach(a=>{const owner=a['현재보유자']||'미지정';(g[owner]=g[owner]||[]).push(a)});return `<div class="asset-owner">${Object.keys(g).sort().map(o=>`<div class="owner-card"><b>${esc(o)} <span class="muted small">${g[o].length}개</span></b><div class="owned">${g[o].map(a=>`<span class="badge ok">${esc(a['자산명'])}</span>`).join('')}</div></div>`).join('')}</div>`}
function weeklyFeeList(rows){if(!rows.length)return `<p class="muted small">기준공금 정보가 없습니다.</p>`;return `<div class="mini-list">${rows.map(r=>`<div class="mini-item"><span>${esc(r.month)} · ${esc(r.week)}주차</span><b>${fmtMoney(r.fee)}</b></div>`).join('')}</div>`}
function weekOptions(){const count=state.data?.week_count||4;let html='';for(let i=1;i<=count;i++)html+=`<option value="${i}">${i}주차</option>`;return html}
function statusBadge(s){s=String(s||'-');let cls='';if(['승인','납부완료','정상','일치','보관중','지급중','보유중','회수','지급','수입','면제'].includes(s))cls='ok';if(['대기','부족','조정','미배정'].includes(s))cls='warn';if(['반려','미납','삭제','차이발생','분실','지출'].includes(s))cls='bad';return `<span class="badge ${cls}">${esc(s)}</span>`}
function val(id){return document.getElementById(id)?.value||''}function currentMonth(){return state.data?.current_month||state.month||new Date().toISOString().slice(0,7)}function today(){return new Date().toISOString().slice(0,10)}function isAdmin(){return !!state.session?.is_admin}function num(v){const n=Number(String(v??'').replace(/,/g,''));return isNaN(n)?0:n}function fmtMoney(v){if(v===undefined||v===null||v==='')return'-';return `${num(v).toLocaleString()}원`}function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function setBusy(btn,busy,label){if(!btn)return;if(busy){btn.dataset.old=btn.innerHTML;btn.disabled=true;btn.innerHTML=`<span class="loader"></span>${label||'처리 중'}`}else{btn.disabled=false;btn.innerHTML=btn.dataset.old||btn.innerHTML}}function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200)}
</script>
</body>
</html>
